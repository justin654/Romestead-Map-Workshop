name: Release

# Runs only when you push a version tag (v0.1.0) or use Actions → Run workflow.
# Pushing to master alone does not trigger this workflow.

on:
  push:
    tags:
      - 'v*'   # e.g. v0.1.0
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version
        id: version
        shell: pwsh
        run: |
          $ref = "${{ github.ref }}"
          if ($ref.StartsWith('refs/tags/')) {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $version = "0.0.0-${{ github.run_number }}"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Publish self-contained single-file
        shell: pwsh
        run: |
          dotnet publish `
            -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:Version=${{ steps.version.outputs.version }}

      - name: Stage artifact
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net8.0-windows/win-x64/publish"
          $stage = "stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$publishDir/MapWorkshop.exe" $stage
          Copy-Item "README.md" $stage
          Copy-Item "LICENSE" $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "MapWorkshop-win-x64-${{ steps.version.outputs.version }}.zip"

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MapWorkshop-win-x64-${{ steps.version.outputs.version }}.zip
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MapWorkshop-win-x64-${{ steps.version.outputs.version }}
          path: MapWorkshop-win-x64-${{ steps.version.outputs.version }}.zip
